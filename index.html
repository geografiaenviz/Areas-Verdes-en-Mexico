<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Geoportal Áreas Verdes México</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="panel">
<h2>🌳 Observatorio de Áreas Verdes Urbanas de México</h2>
<p>
<b>Datos satelitales 2025</b><br><br>
🛰 Satélite + IA<br>
💻 Realizado por el Geógrafo:
Jorge Ibares<br><br>
</p>

<div id="contadorCiudades"></div>

<select id="selector">
<option value="">Selecciona una ciudad</option>
</select>
</div>

<div id="statsPanel">
<h3>📊 Estadísticas</h3>
<div id="statsCiudad">Selecciona una ciudad</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([23, -102], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
maxZoom: 19
}).addTo(map);

let capaActual;

function colorFn(v){

if(v == null || isNaN(v))
return "#666666";

if(v <= 0.123)
return "#d73027";

if(v <= 0.153)
return "#fc8d59";

if(v <= 0.20)
return "#fee08b";

if(v <= 0.30)
return "#91cf60";

return "#1a9850";

}
fetch("catalogo.json")
.then(r => r.json())
.then(data => {

document.getElementById("contadorCiudades").innerHTML =
`🌎 ${data.length} ciudades disponibles`;

const selector = document.getElementById("selector");

data.forEach(c=>{
let opt = document.createElement("option");
opt.value = c.ruta;
opt.text = `${c.nombre} (${c.estado})`;
selector.appendChild(opt);
});
});

document.getElementById("selector").addEventListener("change", async function(){

if(capaActual) map.removeLayer(capaActual);
if(!this.value) return;

const res = await fetch(this.value);
const geo = await res.json();

let valores = geo.features
.map(f => f.properties.MSAVI_mean)
.filter(v => v != null && !isNaN(v));

const c1 = valores.filter(v => v <= 0.123).length;

const c2 = valores.filter(
v => v > 0.123 && v <= 0.153
).length;

const c3 = valores.filter(
v => v > 0.153 && v <= 0.20
).length;

const c4 = valores.filter(
v => v > 0.20 && v <= 0.30
).length;

const c5 = valores.filter(
v => v > 0.30
).length;

const promedio = (valores.reduce((a,b)=>a+b,0)/valores.length).toFixed(3);

document.getElementById("statsCiudad").innerHTML = `
🏘️ Colonias: ${valores.length}<br>
🌳 MSAVI promedio: ${promedio}<br><br>
🔴 Muy bajo (<5%) : ${c1}<br>
🟠 Bajo (5–15%) : ${c2}<br>
🟡 Medio (15–30%) : ${c3}<br>
🟢 Alto (30–40%) : ${c4}<br>
🟢🟢 Muy alto (>40%) : ${c5}
`;

capaActual = L.geoJSON(geo,{
style: f => ({
fillColor: colorFn(f.properties.MSAVI_mean),
fillOpacity: 0.8,
weight: 0.3,
color: "#000"
}),
onEachFeature: (f,l)=>{
let col = f.properties.nom_col || "Sin nombre";
let msavi = f.properties.MSAVI_mean;

l.bindPopup(`<b>${col}</b><br>MSAVI: ${msavi}`);
l.bindTooltip(`${col} | ${msavi}`,{sticky:true});
}
}).addTo(map);

map.flyToBounds(capaActual.getBounds(),{padding:[40,40],duration:1.8});
});

</script>

</body>
</html>
